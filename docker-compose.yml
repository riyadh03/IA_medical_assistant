services:
  backend:
    build: ./backend
    container_name: medical_backend
    ports:
      - "8080:8000"
    volumes:
      - ./backend:/app
      - ./mcp_server:/mcp_server
    env_file:
      - ./backend/.env
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: medical_frontend
    ports:
      - "3002:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend