<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <!-- Medical Cross Gradient -->
    <linearGradient id="crossGradient" x1="60" y1="40" x2="120" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
  </defs>
  
  <!-- Outer Rounded Rectangle -->
  <rect width="180" height="180" rx="44" fill="url(#bgGradient)" stroke="#334155" stroke-width="2" />
  
  <!-- Medical Cross / Shield Base -->
  <g filter="drop-shadow(0px 4px 12px rgba(56, 189, 248, 0.25))">
    <!-- Stylized Medical Cross with rounded edges -->
    <path d="M78 40H102C104.209 40 106 41.7909 106 44V74H136C138.209 74 140 75.7909 140 78V102C140 104.209 138.209 106 136 106H106V136C106 138.209 104.209 140 102 140H78C75.7909 140 74 138.209 74 136V106H44C41.7909 106 40 104.209 40 102V78C40 75.7909 41.7909 74 44 74H74V44C74 41.7909 75.7909 40 78 40Z" fill="url(#crossGradient)" />
  </g>
  
  <!-- Pulse / ECG Line Overlay (White / Cyan Glow) -->
  <path d="M40 90H65L73 70L85 115L95 80L103 100L111 90H140" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="drop-shadow(0px 0px 6px rgba(255, 255, 255, 0.8))" />
</svg>